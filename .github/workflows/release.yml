name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            rid: win-x64
            arch: x64
          - os: windows-latest
            rid: win-arm64
            arch: arm64

          # Linux
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64

          # macOS
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Strip version prefix
        id: version
        shell: bash
        run: echo "ver=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Native AOT Dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish
        run: >
          dotnet publish MediaDebrid-cli.csproj -c Release
          -r ${{ matrix.rid }}
          /p:PublishAot=true
          /p:SelfContained=true
          /p:Version=${{ steps.version.outputs.ver }}
          -o ./publish/${{ matrix.rid }}

      # --- Windows: per-arch installer ---
      - name: Build Inno Setup Installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.version.outputs.ver }} `
            /DArch=${{ matrix.arch }} `
            installer.iss

      - name: Prepare Windows Artifacts
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            mv Output/*.exe ./publish/${{ matrix.rid }}/mediadebrid-v${{ steps.version.outputs.ver }}-win-installer-x64.exe
          else
            mv Output/*.exe ./publish/${{ matrix.rid }}/mediadebrid-v${{ steps.version.outputs.ver }}-win-installer-arm64.exe
          fi
          rm ./publish/${{ matrix.rid }}/mediadebrid.exe

      # --- Unix: chmod + tarball ---
      - name: Prepare Unix Artifacts
        if: runner.os != 'Windows'
        run: |
          chmod +x ./publish/${{ matrix.rid }}/mediadebrid

          cd ./publish/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == "osx-x64" ]]; then
            tar -czvf mediadebrid-v${{ steps.version.outputs.ver }}-macos-x64.tar.gz mediadebrid
          elif [[ "${{ matrix.rid }}" == "osx-arm64" ]]; then
            tar -czvf mediadebrid-v${{ steps.version.outputs.ver }}-macos-arm64.tar.gz mediadebrid
          else
            tar -czvf mediadebrid-v${{ steps.version.outputs.ver }}-${{ matrix.rid }}.tar.gz mediadebrid
          fi
          rm mediadebrid
          cd ../../

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediadebrid-${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG  version=$VERSION"

      - name: Bump version in csproj
        shell: bash
        run: |
          sed -i 's|<Version>[^<]*</Version>|<Version>${{ steps.version.outputs.version }}</Version>|' MediaDebrid-cli.csproj

      - name: Commit and push version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MediaDebrid-cli.csproj
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "workflow: bumped version to ${{ steps.version.outputs.version }}"
            git push origin HEAD:main
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          files: |
            mediadebrid-*/*.exe
            mediadebrid-*/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}